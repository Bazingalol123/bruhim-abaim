<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פאנל ניהול - סרטוני החתונה | Admin Panel</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Admin Panel Styles -->
    <link rel="stylesheet" href="styles/admin-panel.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="header-left">
                    <img src="images/logo.png" alt="Odelya & Omer" class="header-logo">
                    <div class="header-titles">
                        <h1 class="header-title">פאנל ניהול</h1>
                        <p class="header-subtitle">סרטוני ברכות מהאורחים</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span class="user-email" id="userEmail">טוען...</span>
                    </div>
                    <button id="logoutButton" class="btn-logout">
                        <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        יציאה
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 7l-7 5 7 5V7z"></path>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalVideos">0</div>
                        <div class="stat-label">סרטונים</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalGuests">0</div>
                        <div class="stat-label">אורחים</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalSize">0 MB</div>
                        <div class="stat-label">נפח</div>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="state-container">
                <div class="loader-spinner"></div>
                <p class="state-message">טוען סרטונים...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="state-container hidden">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 7l-7 5 7 5V7z"></path>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
                <h2 class="state-title">אין סרטונים עדיין</h2>
                <p class="state-message">כשאורחים יעלו סרטוני ברכות, הם יופיעו כאן</p>
                <a href="index.html" class="btn-primary">חזרו לדף הראשי</a>
            </div>

            <!-- Error State -->
            <div id="errorState" class="state-container hidden">
                <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <h2 class="state-title">שגיאה בטעינת הסרטונים</h2>
                <p class="state-message" id="errorMessage">אנא נסו לרענן את הדף</p>
                <button class="btn-primary" onclick="window.location.reload()">רעננו</button>
            </div>

            <!-- Videos Grid -->
            <div id="videosGrid" class="videos-grid hidden">
                <!-- Video cards will be dynamically inserted here -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="admin-footer">
            <p>© 2026 Odelya & Omer | פותח באהבה לחתונה שלנו</p>
        </footer>
    </div>

    <!-- Video Player Modal -->
    <div id="videoModal" class="modal hidden">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-header">
                <h2 id="modalGuestName">שם אורח</h2>
                <p id="modalDate">תאריך</p>
            </div>
            <div class="modal-video-container">
                <video id="modalVideo" controls preload="metadata">
                    <source id="modalVideoSource" type="video/webm">
                    הדפדפן שלך אינו תומך בהצגת וידאו
                </video>
            </div>
            <div class="modal-actions">
                <a id="modalDownload" class="btn-download" download>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    הורידו סרטון
                </a>
            </div>
        </div>
    </div>

    <!-- Admin Panel Script -->
    <script type="module" src="js/admin/admin-panel.js"></script>
</body>
</html>
